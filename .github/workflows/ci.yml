name: versionlib-ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  posix:
    name: versionlib POSIX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Alire
        uses: alire-project/setup-alire@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y git tar
      - name: Build versionlib verification tooling
        run: cd tools && alr build
      - name: Run versionlib release preflight
        # Builds the library, builds and runs the AUnit suite, and runs
        # versionlib's own ref-write-policy, version-metadata, test-scope, and
        # documentation/manifest checks.
        run: ./tools/bin/check_release_ready

  windows:
    name: versionlib Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Alire
        uses: alire-project/setup-alire@v2
      - name: Build library
        shell: bash
        run: alr build
      - name: Build and run the AUnit suite
        shell: bash
        run: |
          (cd tests && alr exec -- gprbuild -P versionlib_tests.gpr)
          if [ -f ./tests/bin/tests.exe ]; then ./tests/bin/tests.exe; else ./tests/bin/tests; fi
